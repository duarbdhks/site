<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>학습 컨텐츠 모음</title>
  <style>
:root {
  --bg: #f6f7fb;
  --paper: #ffffff;
  --ink: #172033;
  --muted: #607086;
  --line: #dce3ee;
  --soft: #eef3ff;
  --soft2: #fff8e6;
  --accent: #325dff;
  --accent2: #111827;
  --good: #0f766e;
  --warn: #b45309;
  --bad: #b91c1c;
  --code: #111827;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.82;
  word-break: keep-all;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.layout { max-width: 1120px; margin: 0 auto; padding: 28px 20px 80px; }
.hero {
  background: linear-gradient(135deg, #111827 0%, #26375f 60%, #325dff 100%);
  color: white;
  border-radius: 28px;
  padding: 44px 38px;
  margin-bottom: 24px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, .18);
}
.hero .eyebrow { opacity: .78; font-size: 14px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
.hero h1 { margin: 0 0 16px; font-size: 38px; line-height: 1.25; letter-spacing: -0.03em; }
.hero p { max-width: 820px; margin: 0; color: rgba(255,255,255,.88); font-size: 17px; }
.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 28px;
  margin: 18px 0;
  box-shadow: 0 10px 30px rgba(15, 23, 42, .05);
}
h2 { margin: 0 0 18px; font-size: 27px; letter-spacing: -0.02em; line-height: 1.35; }
p { margin: 12px 0; }
.grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
.tile { background: #fbfdff; border: 1px solid var(--line); border-radius: 18px; padding: 18px; }
.tile h3 { margin-top: 0; }
.small { color: var(--muted); font-size: 14px; }
@media (max-width: 820px) {
  .hero { padding: 34px 24px; border-radius: 22px; }
  .hero h1 { font-size: 30px; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 22px; }
  body { line-height: 1.76; }
}
</style>
</head>
<body>
  <main class="layout">
    <section class="hero">
      <div class="eyebrow">학습 아카이브</div>
      <h1>📚 학습 컨텐츠 모음</h1>
      <p>주제별·회차별로 정리한 강의형 학습 자료 모음입니다. 각 카드를 열면 해당 강좌의 전체 로드맵으로 이동합니다.</p>
    </section>
    <section class="card">
      <h2>🗂️ 강좌 목록</h2>
      <div class="grid">
        <div class="tile">
          <h3>🧭 ClickHouse 학습 로드맵 · 1회차</h3>
          <p>MergeTree 설계부터 CDC 정합성, 집계, 쿼리 최적화, 운영 관측, 적재/비용까지 6주차 구성.</p>
          <p class="small">clickhouse / learning1 · 6개 주차 html</p>
          <p><a href="clickhouse/learning1/index.html">열기 →</a></p>
        </div>
        <!-- 신규 강좌 추가 시 위 .tile 블록을 복사해 아래에 붙여넣고
             제목/설명/경로만 교체 (예: clickhouse/learning2/index.html,
             other-subject/learning1/index.html) -->
      </div>
    </section>
  </main>
</body>
</html>
</content>
